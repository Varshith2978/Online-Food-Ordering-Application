{% extends "base.html" %}
{% block content %}

<div class="container my-5">
    <h2>Order #{{ order.id }}</h2>
    <p>Total: ₹{{ order.total }}</p>
    <p>Date: {{ order.created_at }}</p>

    <table class="table table-bordered mt-3">
        <tr>
            <th>Product ID</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item.product_id }}</td>
            <td>{{ item.quantity }}</td>
            <td>₹{{ item.price }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
