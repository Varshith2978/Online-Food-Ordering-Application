{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header fw-bold">Delivery Details</div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea class="form-control"
                          name="address"
                          rows="4"
                          required>{{ user.address or '' }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text"
                       class="form-control"
                       name="phone"
                       value="{{ user.phone or '' }}"
                       required>
            </div>

            <button class="btn btn-primary w-100">
                Place Order
            </button>
        </form>
    </div>
</div>
{% endblock %}
